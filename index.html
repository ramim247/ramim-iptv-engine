<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAMIM IPTV Engine Dashboard</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent: #58a6ff;
            --text: #c9d1d9;
            --success: #238636;
            --danger: #da3633;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #8b949e;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            text-align: center;
        }
        .card h3 {
            margin: 0 0 10px 0;
            color: #8b949e;
            font-size: 14px;
            text-transform: uppercase;
        }
        .card .value {
            font-size: 28px;
            font-weight: bold;
        }
        .live { color: #56d364; }
        .dead { color: #f85149; }
        .url-box {
            background-color: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .url-box h3 { margin-top: 0; color: #fff; }
        .copy-section {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            background: #090d16;
            border: 1px solid #30363d;
            padding: 10px;
            color: #fff;
            border-radius: 6px;
            font-family: monospace;
        }
        button {
            background-color: var(--success);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #2ea043; }
        .cat-list {
            background-color: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
        }
        .cat-list h3 { margin-top: 0; color: #fff; }
        .cat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #21262d;
        }
        .cat-item:last-child { border: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>RAMIM IPTV ENGINE</h1>
    <div class="subtitle">Last Updated: <span id="update-time">Loading...</span></div>

    <div class="grid">
        <div class="card">
            <h3>Live Channels</h3>
            <div class="value live" id="live-count">-</div>
        </div>
        <div class="card">
            <h3>Tracked Dead</h3>
            <div class="value dead" id="dead-count">-</div>
        </div>
    </div>

    <div class="url-box">
        <h3>Your Custom M3U8 Playlist URL</h3>
        <div class="copy-section">
            <input type="text" id="playlist-url" readonly>
            <button onclick="copyUrl()">Copy URL</button>
        </div>
    </div>

    <div class="cat-list">
        <h3>Category Breakdown</h3>
        <div id="categories-container">Loading breakdown...</div>
    </div>
</div>

<script>
    // আপনার রিপোজিটরির তথ্যের ওপর ভিত্তি করে অটো-ইউআরএল জেনারেট
    const pathArray = window.location.pathname.split('/');
    const repoName = pathArray[1] || "ramim-iptv-engine";
    const username = window.location.hostname.split('.')[0];
    
    const rawM3uUrl = `https://raw.githubusercontent.com/${username}/${repoName}/main/master.m3u8`;
    document.getElementById('playlist-url').value = rawM3uUrl;

    // stats.json ফাইল থেকে লাইভ ডেটা রিড করা
    fetch('stats.json')
        .then(response => response.json())
        .then(data => {
            document.getElementById('update-time').innerText = data.last_updated;
            document.getElementById('live-count').innerText = data.total_live;
            document.getElementById('dead-count').innerText = data.total_dead;

            const catContainer = document.getElementById('categories-container');
            catContainer.innerHTML = '';
            
            for (const [category, count] of Object.entries(data.categories)) {
                const item = document.createElement('div');
                item.className = 'cat-item';
                item.innerHTML = `<span>${category}</span><strong>${count} Channels</strong>`;
                catContainer.appendChild(item);
            }
        })
        .catch(err => {
            console.error('Error loading stats:', err);
        });

    function copyUrl() {
        const copyText = document.getElementById("playlist-url");
        copyText.select();
        copyText.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(copyText.value);
        alert("Playlist URL Copied!");
    }
</script>
</body>
</html>
