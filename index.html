<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAMIM IPTV Engine - Premium Dashboard</title>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(16px);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --neon-blue: #38bdf8;
            --neon-green: #4ade80;
            --neon-purple: #c084fc;
            --neon-red: #f87171;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* পিসিতে স্ক্রল বন্ধ করার জন্য */
        }

        /* Background Glossy Orbs */
        .orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.3;
        }
        .orb-1 { top: -50px; left: -50px; background: #3b82f6; }
        .orb-2 { bottom: -50px; right: -50px; background: #a855f7; }

        .container {
            max-width: 850px;
            width: 100%;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Header Styling */
        header {
            text-align: center;
        }
        header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 50px;
            font-size: 0.75rem;
            color: var(--neon-blue);
            font-weight: 600;
            margin-top: 4px;
            text-transform: uppercase;
        }

        /* Glassmorphism Card Base */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Timestamps Grid */
        .time-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .time-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .time-item i {
            font-size: 1.3rem;
            color: var(--neon-blue);
        }
        .time-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .time-value {
            font-size: 0.95rem;
            font-weight: 600;
        }
        #countdown {
            color: var(--neon-purple);
            font-family: monospace;
        }

        /* Stats Counter Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .stat-card {
            text-align: center;
        }
        .stat-card h3 {
            margin: 0 0 4px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .stat-card .counter {
            font-size: 2.2rem;
            font-weight: 800;
        }
        .stat-card.live .counter { color: var(--neon-green); }
        .stat-card.dead .counter { color: var(--neon-red); }

        /* URL Copy Section */
        .url-box h3 {
            margin: 0 0 10px 0;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .copy-group {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            padding: 10px;
            color: #fff;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            outline: none;
        }
        .btn-copy {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: #fff;
            border: none;
            padding: 0 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
        }

        /* Categories Breakdown */
        .cat-box h3 {
            margin: 0 0 12px 0;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cat-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .cat-item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cat-name {
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .cat-count {
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--neon-blue);
        }

        /* Footer & Owner Section */
        footer {
            text-align: center;
            border-top: 1px solid var(--glass-border);
            padding-top: 12px;
            margin-top: 4px;
        }
        .owner-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .social-btn {
            padding: 6px 14px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #fff;
        }
        .fb { background: #1877f2; }
        .wa { background: #25d366; }
        
        .copyright {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* Mobile Specific Optimization */
        @media (max-width: 600px) {
            body {
                overflow: auto; /* মোবাইলের জন্য স্ক্রল এনাবল থাকবে */
            }
            .time-grid, .stats-grid {
                grid-template-columns: 1fr;
            }
            .cat-list {
                grid-template-columns: repeat(2, 1fr);
            }
            header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="container">
    <header>
        <h1>RAMIM IPTV SELF-HEALING ENGINE</h1>
        <div class="badge"><i class="fa-solid fa-shield-halved"></i> Source Status: Public</div>
    </header>

    <!-- Timestamps and Countdown -->
    <div class="time-grid">
        <div class="glass-card time-item">
            <i class="fa-regular fa-clock"></i>
            <div>
                <div class="time-label">Last Successful Sync</div>
                <div class="time-value" id="update-time">Loading...</div>
            </div>
        </div>
        <div class="glass-card time-item">
            <i class="fa-solid fa-hourglass-half"></i>
            <div>
                <div class="time-label">Next Auto-Update In</div>
                <div class="time-value" id="countdown">Calculating...</div>
            </div>
        </div>
    </div>

    <!-- Counters Section -->
    <div class="stats-grid">
        <div class="glass-card stat-card live">
            <h3><i class="fa-solid fa-circle-check"></i> Live Channels</h3>
            <div class="counter" id="live-count">0</div>
        </div>
        <div class="glass-card stat-card dead">
            <h3><i class="fa-solid fa-circle-xmark"></i> Isolated Dead Pool</h3>
            <div class="counter" id="dead-count">0</div>
        </div>
    </div>

    <!-- Playlist URL Copy Card -->
    <div class="glass-card url-box">
        <h3><i class="fa-solid fa-link"></i> M3U8 Main Playlist Direct Link</h3>
        <div class="copy-group">
            <input type="text" id="playlist-url" readonly value="Generating Link...">
            <button class="btn-copy" onclick="copyUrl()"><i class="fa-regular fa-copy"></i> Copy Link</button>
        </div>
    </div>

    <!-- Category Grid -->
    <div class="glass-card cat-box">
        <h3><i class="fa-solid fa-layer-group"></i> Categories</h3>
        <div class="cat-list" id="categories-container">
            <div class="text-muted">Loading...</div>
        </div>
    </div>

    <!-- Footer & Owner Info -->
    <footer>
        <div class="owner-name">Ramim Talukder</div>

        <div class="social-links">
            <a href="https://web.facebook.com/RamimTalukderFB" target="_blank" class="social-btn fb">
                <i class="fa-brands fa-facebook"></i> Facebook
            </a>
            <a href="https://wa.me/8801613275460" target="_blank" class="social-btn wa">
                <i class="fa-brands fa-whatsapp"></i> WhatsApp
            </a>
        </div>

        <div class="copyright">
            &copy; 2026 RAMIM. All Rights Reserved.
        </div>
    </footer>
</div>

<script>
    // URL Auto Generation
    const pathArray = window.location.pathname.split('/');
    const repoName = pathArray[1] || "ramim-iptv-engine";
    const username = window.location.hostname.split('.')[0] || "ramim247";
    const rawM3uUrl = `https://raw.githubusercontent.com/${username}/${repoName}/main/master.m3u8`;
    document.getElementById('playlist-url').value = rawM3uUrl;

    // Fast Counter Animation Function
    function animateCounter(id, targetValue) {
        const obj = document.getElementById(id);
        if(!obj) return;
        let startTimestamp = null;
        const duration = 800; 
        const startValue = 0;
        
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            obj.innerHTML = Math.floor(progress * (targetValue - startValue) + startValue).toLocaleString();
            if (progress < 1) {
                window.requestAnimationFrame(step);
            } else {
                obj.innerHTML = targetValue.toLocaleString();
            }
        };
        window.requestAnimationFrame(step);
    }

    // Next Update Countdown Timer (BD Time 12:00 AM / 18:00 UTC)
    function startCountdown() {
        setInterval(() => {
            const now = new Date();
            let nextUpdate = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), 18, 0, 0));
            if (now >= nextUpdate) {
                nextUpdate.setUTCDate(nextUpdate.getUTCDate() + 1);
            }
            const diff = nextUpdate - now;
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById("countdown").innerHTML = 
                `${hours.toString().padStart(2, '0')}h : ${minutes.toString().padStart(2, '0')}m : ${seconds.toString().padStart(2, '0')}s`;
        }, 1000);
    }

    // Fetch Stats
    fetch('stats.json')
        .then(response => response.json())
        .then(data => {
            document.getElementById('update-time').innerText = data.last_updated;
            
            animateCounter('live-count', data.total_live);
            animateCounter('dead-count', data.total_dead);

            const catContainer = document.getElementById('categories-container');
            catContainer.innerHTML = '';
            
            const icons = {
                'Sports': 'fa-solid fa-trophy',
                'News': 'fa-solid fa-newspaper',
                'Movies': 'fa-solid fa-film',
                'Entertainment': 'fa-solid fa-tv',
                'Music': 'fa-solid fa-music',
                'Kids': 'fa-solid fa-child',
                'Other': 'fa-solid fa-folder-open'
            };

            for (const [category, count] of Object.entries(data.categories)) {
                const iconClass = icons[category] || 'fa-solid fa-circle';
                const item = document.createElement('div');
                item.className = 'cat-item';
                item.innerHTML = `
                    <div class="cat-name"><i class="${iconClass}" style="color: var(--neon-blue)"></i> ${category}</div>
                    <div class="cat-count">${count}</div>
                `;
                catContainer.appendChild(item);
            }
            startCountdown();
        })
        .catch(err => {
            console.error('Error loading statistics:', err);
            document.getElementById("countdown").innerHTML = "Engine Pending Run";
        });

    function copyUrl() {
        const copyText = document.getElementById("playlist-url");
        copyText.select();
        copyText.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(copyText.value);
        
        const btn = document.querySelector('.btn-copy');
        btn.innerHTML = `<i class="fa-solid fa-check"></i> Copied!`;
        btn.style.background = "linear-gradient(135deg, #16a34a 0%, #15803d 100%)";
        
        setTimeout(() => {
            btn.innerHTML = `<i class="fa-regular fa-copy"></i> Copy Link`;
            btn.style.background = "linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%)";
        }, 2000);
    }
</script>
</body>
</html>
